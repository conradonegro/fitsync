name: EAS Build

on:
  push:
    branches:
      - develop  # → preview profile
      - main     # → production profile

# TODO Phase 1 T16: Complete this workflow.
# Requires: EXPO_TOKEN in GitHub secrets.
# EAS Build is NEVER triggered on PRs — queue times are 20-40min on free tier.
# See ADR-022.

jobs:
  build:
    name: EAS Build (${{ github.ref_name }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (preview)
        if: github.ref_name == 'develop'
        working-directory: apps/mobile
        run: eas build --platform android --profile preview --non-interactive

      - name: EAS Build (production)
        if: github.ref_name == 'main'
        working-directory: apps/mobile
        run: eas build --platform all --profile production --non-interactive
